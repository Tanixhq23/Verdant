services:
  - type: web
    name: verdant-app
    runtime: node
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: mkdir -p Backend/.cache/puppeteer && cd Backend && npm ci && npx puppeteer browsers install chrome --path ./.cache/puppeteer
    startCommand: cd Backend && npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: GREENWEB_API
        value: https://api.thegreenwebfoundation.org/greencheck/
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/src/Backend/.cache/puppeteer
      - key: MONGODB_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
